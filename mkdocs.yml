theme:
  name: material
  language: id

  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.collapse
    - navigation.top
    - search.highlight
    - content.code.copy
    - navigation.footer
    - footer.social
    - footer.copyright

  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Mode terang

    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Mode gelap

plugins:
  - search
  - macros
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.tasklist

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pklsmkmq
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@n3projects208

  copyright: © 2025 N3 Projects
  generator:
    name: "MkDocs"
    link: "https://www.mkdocs.org/"
